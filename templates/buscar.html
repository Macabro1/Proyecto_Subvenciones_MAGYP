{% extends "base.html" %}
{% block content %}

<h2>Buscar por Cédula</h2>

<form method="POST">
<input type="text" name="cedula" class="form-control" required>
<button class="btn btn-success mt-2">Buscar</button>
</form>

{% if resultados %}
<hr>
{% for s in resultados %}
<p>
Solicitud #{{ s.id }} - {{ s.producto.nombre }} - {{ s.estado }}
</p>
{% endfor %}
{% endif %}

{% endblock %}
