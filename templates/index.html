{% extends "base.html" %}

{% block title %}Inicio{% endblock %}

{% block content %}

<div class="container mt-4">

    <!-- ========================= -->
    <!-- ESTADÍSTICAS REALES -->
    <!-- ========================= -->

    <div class="row text-center mb-4">

        <div class="col-md-4">
            <div class="card bg-primary text-white shadow">
                <div class="card-body">
                    <h5>Total Solicitudes</h5>
                    <h3>{{ total_solicitudes }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-success text-white shadow">
                <div class="card-body">
                    <h5>Aprobadas</h5>
                    <h3>{{ aprobadas }}</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-danger text-white shadow">
                <div class="card-body">
                    <h5>Rechazadas</h5>
                    <h3>{{ rechazadas }}</h3>
                </div>
            </div>
        </div>

    </div>


    <!-- ========================= -->
    <!-- FORMULARIO CONECTADO A INVENTARIO -->
    <!-- ========================= -->

    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4>Formulario de Solicitud de Paquete Tecnológico</h4>
        </div>

        <div class="card-body">

            <form method="POST" action="{{ url_for('solicitar') }}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cédula</label>
                        <input type="text" name="cedula" class="form-control" required pattern="\d{10}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Rubro</label>
                        <select name="producto_id" class="form-select" required>
                            <option value="">Seleccione...</option>
                            {% for p in productos %}
                                <option value="{{ p.id }}">
                                    {{ p.nombre }} 
                                    - Precio: ${{ p.precio }} 
                                    - Subsidio: {{ p.subsidio }}%
                                    - Stock: {{ p.cantidad }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success btn-lg">
                        Enviar Solicitud
                    </button>
                </div>

            </form>

        </div>
    </div>


    <!-- ========================= -->
    <!-- BOTONES DE NAVEGACIÓN -->
    <!-- ========================= -->

    <div class="text-center mt-4">
        <a href="{{ url_for('listar_solicitudes') }}" class="btn btn-outline-secondary me-2">
            Ver Solicitudes
        </a>

        <!-- ✅ CORREGIDO AQUÍ -->
        <a href="{{ url_for('ver_inventario') }}" class="btn btn-outline-primary me-2">
            Ver Inventario
        </a>

        <a href="#" class="btn btn-outline-dark">
            Reportes
        </a>
    </div>

</div>

{% endblock %}
